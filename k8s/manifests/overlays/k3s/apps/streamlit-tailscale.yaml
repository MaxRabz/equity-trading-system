---
apiVersion: v1
kind: Service
metadata:
  name: traefik-bridge
  namespace: backend
spec:
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: traefik-bridge
  namespace: backend
subsets:
  - addresses:
      - ip: 10.43.82.40
    ports:
      - port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tailscale-ui-entry
  namespace: backend
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - ui
  rules:
    - host: ui
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: traefik-bridge
                port:
                  number: 80
